<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker</title>
<link rel="stylesheet" href="/style.css">

</head>


<body>


<h2 id="premiumMessage"></h2>


<h2>Expense Tracker</h2>
<label for="rowsPerPage">Expenses Per Page:</label>

<select id="rowsPerPage">
    <option value="5">5</option>
    <option value="10" selected>10</option>
    <option value="20">20</option>
    <option value="50">50</option>
</select>

<br><br>


<form id="expenseForm">


<label>Choose Expense Amount:</label>
<input type="number" id="amount" required>


<label>Description:</label>
<input type="text" id="description" required>

<label>Note:</label>
<input type="text" id="note" placeholder="Enter a note">

<label>Category:</label>

<select id="category">

<option value="Food">Food</option>
<option value="Petrol">Petrol</option>
<option value="Salary">Salary</option>
<option value="Shopping">Shopping</option>
<option value="Movie">Movie</option>
<option value="Income">Income</option>

</select>


<button type="submit">
Add Expense
</button>


<button 
id="leaderboardBtn"
type="button"
style="display:none">

Show Leaderboard

</button>


</form>


<ul id="leaderboardList"></ul>


<hr>



<div id="premiumDashboard" style="display:none;">


<h2>📊 Day To Day Expenses</h2>


<button onclick="filterExpense('daily')">
Daily
</button>


<button onclick="filterExpense('weekly')">
Weekly
</button>


<button onclick="filterExpense('monthly')">
Monthly
</button>


<br><br>


<h3>
Total Income:
₹<span id="totalIncome">0</span>
</h3>


<h3>
Total Expense:
₹<span id="totalExpense">0</span>
</h3>


<h3>
Savings:
₹<span id="savings">0</span>
</h3>



<table border="1" width="100%">


<thead>

<tr>

<th>Date</th>
<th>Description</th>
<th>Category</th>
<th>Income</th>
<th>Expense</th>

</tr>

</thead>


<tbody id="reportTableBody">

</tbody>


</table>


<br>


<button
id="downloadBtn"
type="button"
disabled>

Download Expenses

</button>


</div>



<hr>


<ul id="expenseList"></ul>

<div id="pagination"></div>
<br>


<button id="renderBtn">

Buy Premium Membership

</button>


<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<script src="/expense.js"></script>


</body>

</html>
